<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0F0F14">
<title>The Architect</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F0F14;--bg2:#1A1A24;--bg3:#242433;
  --gold:#F5C842;--gold2:#E8A800;--goldbg:rgba(245,200,66,0.1);
  --teal:#1D9E75;--tealbg:rgba(29,158,117,0.1);
  --coral:#D85A30;--coralbg:rgba(216,90,48,0.1);
  --amber:#EF9F27;--amberbg:rgba(239,159,39,0.1);
  --purple:#7F77DD;--purplebg:rgba(127,119,221,0.1);
  --red:#E24B4A;--redbg:rgba(226,75,74,0.1);
  --blue:#378ADD;--bluebg:rgba(55,138,221,0.1);
  --green:#639922;--greenbg:rgba(99,153,34,0.1);
  --text:#F0EDE8;--text2:#A09890;--text3:#605850;
  --border:rgba(240,237,232,0.08);--border2:rgba(240,237,232,0.15);
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;font-size:14px;line-height:1.5;max-width:430px;margin:0 auto;position:relative}
button{font-family:inherit;cursor:pointer;border:none;outline:none;background:none}
input,textarea,select{font-family:inherit}

/* SCROLL CONTAINER */
#scroll-area{position:absolute;top:0;left:0;right:0;bottom:60px;overflow-y:auto;-webkit-overflow-scrolling:touch}
#scroll-area::-webkit-scrollbar{display:none}

/* HEADER */
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px;position:sticky;top:0;z-index:40}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.hdr-title{font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text2)}
.xp-row{display:flex;align-items:center;gap:6px}
.xp-val{font-size:15px;font-weight:500;color:var(--gold)}
.xp-lbl{font-size:10px;color:var(--text3);text-transform:uppercase}
.lvl-badge{background:var(--gold2);color:#1A1200;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px}
.xp-bar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.xp-fill{height:100%;background:var(--gold);border-radius:2px;transition:width 0.5s}
.xp-sub{display:flex;justify-content:space-between;margin-top:3px}
.xp-sub span{font-size:10px;color:var(--text3)}

/* BOTTOM NAV */
.bottom-nav{position:absolute;bottom:0;left:0;right:0;height:60px;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding:6px 0 10px;z-index:50}
.bn-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;padding:2px 0;cursor:pointer;-webkit-tap-highlight-color:transparent}
.bn-icon{font-size:14px;line-height:1.2}
.bn-label{font-size:9px;color:var(--text3);letter-spacing:0.03em}
.bn-label.a{color:var(--gold);font-weight:500}
.bn-dot{width:4px;height:4px;border-radius:50%;background:transparent;margin-top:1px}
.bn-dot.a{background:var(--gold)}

/* STREAK */
.streak-bar{display:flex;align-items:center;gap:8px;padding:6px 16px;background:var(--bg2);border-bottom:1px solid var(--border)}
.streak-num{font-size:13px;font-weight:500;color:var(--amber)}
.streak-lbl{font-size:11px;color:var(--text2)}
.s-dots{display:flex;gap:3px;margin-left:auto}
.s-dot{width:7px;height:7px;border-radius:50%;background:var(--bg3)}
.s-dot.l{background:var(--amber)}

/* ENERGY */
.energy-row{display:flex;gap:5px;padding:7px 16px;background:var(--bg2);border-bottom:1px solid var(--border)}
.e-btn{flex:1;padding:6px 3px;border-radius:7px;font-size:11px;font-weight:500;border:1px solid var(--border);background:var(--bg3);color:var(--text2);text-align:center;cursor:pointer;transition:all 0.15s;-webkit-tap-highlight-color:transparent}
.e-btn.sl{background:var(--redbg);border-color:var(--red);color:#F09595}
.e-btn.sm{background:var(--amberbg);border-color:var(--amber);color:#FAC775}
.e-btn.sh{background:var(--tealbg);border-color:var(--teal);color:#5DCAA5}

/* WEEK SELECTOR */
.wsel{display:flex;align-items:center;gap:5px;padding:6px 16px;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.wsel::-webkit-scrollbar{display:none}
.wsel-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap;flex-shrink:0}
.wpill{padding:4px 10px;border-radius:6px;font-size:11px;background:var(--bg3);color:var(--text2);border:1px solid var(--border);flex-shrink:0;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.wpill.a{background:var(--gold);color:#1A1200;font-weight:600;border-color:var(--gold)}

/* DAY ROW */
.day-row{display:flex;gap:4px;padding:7px 16px;background:var(--bg2);border-bottom:1px solid var(--border)}
.day-pill{flex:1;padding:5px 2px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);display:flex;flex-direction:column;align-items:center;gap:2px}
.day-pill.td{border-color:var(--gold);background:var(--goldbg)}
.day-pill.dn{border-color:var(--teal);background:var(--tealbg)}
.dp-n{font-size:9px;font-weight:600;color:var(--text3)}
.day-pill.td .dp-n{color:var(--gold)}
.day-pill.dn .dp-n{color:var(--teal)}
.dp-d{width:4px;height:4px;border-radius:50%;background:transparent}
.day-pill.td .dp-d{background:var(--gold)}
.day-pill.dn .dp-d{background:var(--teal)}

/* PROGRESS */
.prog-row{display:flex;align-items:center;gap:10px;padding:6px 16px;background:var(--bg2);border-bottom:1px solid var(--border)}
.prog-track{flex:1;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--teal);border-radius:2px;transition:width 0.4s}
.prog-num{font-size:11px;color:var(--text2);white-space:nowrap}

/* PLANNER */
.planner-wrap{margin:10px 16px 0}
.planner-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.planner-title{font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3)}
.planner-total{font-size:10px;color:var(--text3)}
.planner-toggle{font-size:10px;color:var(--blue);cursor:pointer;padding:2px 6px}
.planner-blocks{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.planner-block{display:flex;align-items:flex-start;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border)}
.planner-block:last-child{border-bottom:none}
.pb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}
.pb-info{flex:1;min-width:0}
.pb-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:1px}
.pb-tasks{font-size:10px;color:var(--text3);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pb-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
.pb-time{font-size:10px;color:var(--text3);white-space:nowrap}
.pb-type{font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px;text-transform:uppercase;white-space:nowrap}

/* NOTIFICATION SETUP */
.setup-prompt{margin:10px 16px 0;background:var(--bg2);border:1px solid rgba(55,138,221,0.35);border-radius:10px;padding:12px 14px}
.sp-title{font-size:12px;font-weight:500;color:#85B7EB;margin-bottom:4px}
.sp-body{font-size:11px;color:var(--text2);line-height:1.55;margin-bottom:10px}
.sp-steps{display:flex;flex-direction:column;gap:6px}
.sp-step{display:flex;align-items:flex-start;gap:8px;background:var(--bg3);border-radius:8px;padding:8px 10px}
.sp-step-num{width:18px;height:18px;border-radius:50%;background:var(--blue);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.sp-step-body{flex:1;min-width:0}
.sp-step-title{font-size:12px;font-weight:500;color:var(--text);margin-bottom:1px}
.sp-step-desc{font-size:10px;color:var(--text3);line-height:1.4}
.sp-check{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;transition:all 0.15s;margin-top:1px;-webkit-tap-highlight-color:transparent}
.sp-check.done{background:var(--teal);border-color:var(--teal)}
.sp-dismiss{font-size:10px;color:var(--text3);cursor:pointer;margin-top:8px;display:block;text-align:right}

/* SECTION LABELS */
.sec-label{padding:9px 16px 3px;font-size:9px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);display:flex;align-items:center;gap:6px}
.sec-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* TASKS */
.task-item{background:var(--bg2);border-bottom:1px solid var(--border);padding:9px 14px;display:flex;align-items:flex-start;gap:9px;position:relative}
.task-item.comp{opacity:0.4}
.task-item.skip-state{opacity:0.35}
.task-item.carried{border-left:2px solid var(--amber)}
.chk{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border2);background:transparent;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;transition:all 0.15s;margin-top:1px;-webkit-tap-highlight-color:transparent}
.chk.done{background:var(--teal);border-color:var(--teal)}
.chk.sk{background:var(--coral);border-color:var(--coral)}
.task-body{flex:1;min-width:0}
.task-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:3px}
.task-item.comp .task-name{text-decoration:line-through;color:var(--text3)}
.task-item.skip-state .task-name{text-decoration:line-through;color:var(--text3)}
.chips{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:3px}
.chip{font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px;text-transform:uppercase;letter-spacing:0.04em;white-space:nowrap}
.c-time{font-size:10px;font-weight:500;color:var(--gold);background:var(--goldbg);padding:2px 6px;border-radius:20px;border:1px solid rgba(245,200,66,0.2);white-space:nowrap}
.c-xp{font-size:10px;color:var(--amber);font-weight:500;white-space:nowrap}
.c-seed{font-size:9px;color:var(--purple);font-weight:700;background:var(--purplebg);padding:2px 6px;border-radius:20px;border:1px solid rgba(127,119,221,0.25);text-transform:uppercase;white-space:nowrap}
.c-block{font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px;text-transform:uppercase;white-space:nowrap}
.c-quick{font-size:9px;color:var(--teal);font-weight:700;background:var(--tealbg);padding:2px 6px;border-radius:20px;border:1px solid rgba(29,158,117,0.25);text-transform:uppercase}
.c-carry{font-size:9px;color:#FAC775;font-weight:700;background:var(--amberbg);padding:2px 6px;border-radius:20px;border:1px solid rgba(239,159,39,0.3);text-transform:uppercase}
.task-action{font-size:11px;color:var(--text2);line-height:1.55;font-style:italic;margin-top:1px}
.skip-info{font-size:10px;color:var(--text3);margin-top:2px;line-height:1.4}
.skip-btn{font-size:10px;color:var(--text3);cursor:pointer;padding:2px 0;margin-top:3px;display:inline-block;-webkit-tap-highlight-color:transparent}
.tdots{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;flex-shrink:0;color:var(--text3);font-size:14px;letter-spacing:2px;transition:background 0.15s;-webkit-tap-highlight-color:transparent}
.tdots:hover,.tdots:active{background:var(--bg3)}

/* TASK MENU */
.task-menu{position:absolute;right:14px;top:34px;background:#1E1E2E;border:1px solid var(--border2);border-radius:10px;z-index:200;overflow:hidden;min-width:150px;box-shadow:0 4px 20px rgba(0,0,0,0.5)}
.mi{display:flex;align-items:center;gap:9px;padding:11px 14px;font-size:13px;color:var(--text);cursor:pointer;transition:background 0.15s;border-bottom:1px solid var(--border);-webkit-tap-highlight-color:transparent}
.mi:last-child{border-bottom:none}
.mi:active{background:var(--bg3)}
.mi.danger{color:#F09595}
.mi-icon{font-size:13px;width:16px;text-align:center}

/* ADD ROW */
.add-row{display:flex;align-items:center;gap:7px;padding:9px 16px;background:var(--bg2);border-top:1px solid var(--border)}
.add-inp{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:13px;color:var(--text)}
.add-inp::placeholder{color:var(--text3);font-style:italic}
.add-inp:focus{outline:none;border-color:var(--gold)}
.add-btn{padding:7px 13px;background:var(--gold2);color:#1A1200;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}

/* BANNERS */
.banner{margin:10px 16px 0;border-radius:9px;padding:9px 13px;border:1px solid}
.banner-title{font-size:11px;font-weight:500;margin-bottom:2px}
.banner-body{font-size:11px;color:var(--text2);line-height:1.5}
.carry-note{background:var(--amberbg);border:1px solid rgba(239,159,39,0.25);border-radius:8px;padding:8px 13px;margin:8px 16px 0;font-size:11px;color:#FAC775;line-height:1.4}
.day-win{margin:12px 16px;background:var(--tealbg);border:1px solid rgba(29,158,117,0.3);border-radius:11px;padding:14px;text-align:center}
.dw-title{font-size:14px;font-weight:500;color:var(--teal);margin-bottom:3px}
.dw-sub{font-size:11px;color:var(--text2)}

/* CITY */
.city-wrap{padding:14px 16px}
.city-svg-box{width:100%;border-radius:12px;overflow:hidden;border:1px solid var(--border2);margin-bottom:12px;background:var(--bg3)}
.city-svg-box svg{width:100%;display:block}
.city-phase{font-size:11px;color:var(--text3);text-align:center;margin-bottom:12px;line-height:1.5}
.district-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.d-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:11px 12px}
.d-card.ul{border-color:var(--border2)}
.d-card.lk{opacity:0.35}
.d-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:2px}
.d-seed{font-size:10px;color:var(--text3);margin-bottom:6px}
.d-bar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.d-fill{height:100%;border-radius:2px;transition:width 0.4s}

/* REVIEW */
.review-screen{padding:14px 16px}
.r-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px}
.r-hdr{padding:12px 14px;border-bottom:1px solid var(--border);background:rgba(245,200,66,0.04)}
.r-hdr-title{font-size:13px;font-weight:500;color:var(--text)}
.r-hdr-sub{font-size:11px;color:var(--text3);margin-top:2px}
.r-q{padding:10px 14px;border-bottom:1px solid var(--border)}
.r-q:last-child{border-bottom:none}
.r-q-lbl{font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.r-ta{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;color:var(--text);resize:none;min-height:58px;line-height:1.5}
.r-ta:focus{outline:none;border-color:var(--gold)}
.score-row{display:flex;gap:5px;flex-wrap:wrap}
.score-btn{padding:5px 10px;border-radius:6px;font-size:11px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all 0.15s;-webkit-tap-highlight-color:transparent}
.score-btn.sel{background:var(--gold);border-color:var(--gold);color:#1A1200;font-weight:600}
.r-save-btn{width:100%;padding:12px;background:var(--gold);color:#1A1200;border:none;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;margin-top:10px;-webkit-tap-highlight-color:transparent}
.r-saved{width:100%;padding:12px;background:var(--tealbg);color:var(--teal);border:1px solid rgba(29,158,117,0.3);border-radius:9px;font-size:13px;font-weight:500;text-align:center;margin-top:10px}

/* VISION */
.vision-screen{padding:14px 16px}
.v-gc{background:var(--bg2);border:1px solid rgba(127,119,221,0.35);border-radius:12px;padding:14px;margin-bottom:10px}
.v-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--purple);margin-bottom:6px}
.v-txt{font-size:13px;color:var(--text);line-height:1.7}
.v-gp{background:var(--bg2);border:1px solid rgba(29,158,117,0.35);border-radius:12px;padding:14px;margin-bottom:10px}
.v-gp .v-lbl{color:var(--teal)}
.s-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.s-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.s-num{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3)}
.s-score{font-size:9px;color:var(--gold);font-weight:500}
.s-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px}
.s-desc{font-size:11px;color:var(--text2);line-height:1.6;font-style:italic}

/* BOSS */
.boss-screen{padding:14px 16px}
.boss-card{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:16px;margin-bottom:10px;text-align:center}
.boss-name{font-size:16px;font-weight:500;color:var(--text);margin-bottom:4px}
.boss-desc{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:14px}
.boss-health{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-bottom:4px}
.boss-hp{height:100%;background:var(--red);border-radius:4px;transition:width 0.5s}
.boss-hp-lbl{font-size:10px;color:var(--text3);text-align:right;margin-bottom:14px}
.boss-tasks{text-align:left}
.bt{display:flex;align-items:flex-start;gap:8px;padding:9px 0;border-top:1px solid var(--border)}
.bt-chk{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;color:#fff;margin-top:1px;transition:all 0.15s;-webkit-tap-highlight-color:transparent}
.bt-chk.done{background:var(--teal);border-color:var(--teal)}
.bt-txt{font-size:12px;color:var(--text);line-height:1.45}
.bt-xp{font-size:10px;color:var(--amber);margin-top:2px}

/* PARKING */
.parking-screen{padding:14px 16px}
.p-section-title{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.p-dot{width:5px;height:5px;border-radius:50%}
.p-item{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;margin-bottom:6px}
.p-name{font-size:13px;color:var(--text);margin-bottom:2px}
.p-meta{font-size:10px;color:var(--text3)}
.p-move{font-size:10px;color:var(--blue);cursor:pointer;margin-top:4px;display:inline-block;-webkit-tap-highlight-color:transparent}
.p-add-row{display:flex;gap:7px;margin-top:8px}
.p-inp{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:13px;color:var(--text)}
.p-inp::placeholder{color:var(--text3);font-style:italic}
.p-inp:focus{outline:none;border-color:var(--blue)}
.p-btn{padding:7px 12px;background:var(--blue);color:#fff;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;white-space:nowrap;-webkit-tap-highlight-color:transparent}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;padding:16px;z-index:300;max-width:430px;margin:0 auto}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:18px;width:100%;max-height:85vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:500;color:var(--text);margin-bottom:14px}
.m-lbl{font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);margin-bottom:4px;margin-top:10px}

.chip-recurring{font-size:9px;color:var(--amber);font-weight:700;background:var(--amberbg);padding:2px 6px;border-radius:20px;border:1px solid rgba(239,159,39,0.25);text-transform:uppercase;letter-spacing:0.04em;white-space:nowrap}

.city-stage-bar{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:10px}

.city-stage-dot{width:4px;height:4px;border-radius:50%;background:var(--bg3)}
.city-stage-dot.filled{background:var(--gold)}

  bossDone:{},showLU:false,luData:null,
  openMenu:null,editModal:null,addModal:null,
  reviewData:{},reviewHistory:[],parkingLot:[],reviewSaved:false,
  setupDone:{},setupDismissed:false,
  plannerOpen:true,
  expandedReviews:{},
  defaultEnergy:"Medium",
  settingsMsg:null
};

function getLvl(){for(var i=LEVELS.length-1;i>=0;i--){if(S.xp>=LEVELS[i].xp)return LEVELS[i];}return LEVELS[0];}
function getNxt(){var c=getLvl();for(var i=0;i<LEVELS.length;i++){if(LEVELS[i].xp>c.xp)return LEVELS[i];}return null;}

function load(){
  try{
    var d=localStorage.getItem("architect_v10");
    if(d){var p=JSON.parse(d);Object.keys(p).forEach(function(k){S[k]=p[k];});}
  }catch(e){}
}
function save(){
  try{localStorage.setItem("architect_v10",JSON.stringify(S));}catch(e){}
}

function getBaseTasks(){
  var all=getWeekTasks(S.week);
  if(S.energy==="Low") all=all.filter(function(t){return t.mvd||t.carried;});
  return all;
}

function handleSkip(task){
  var rule=task.skipRule||SR[task.cat]||"nc";
  var count=(S.skipCounts[task.id]||0)+1;
  S.skipCounts[task.id]=count;
  S.checked[task.id]="skip";
  if(rule==="c"||rule==="co"){
    var nw=String(parseInt(S.week)+1);
    if(!S.carriedTasks[nw])S.carriedTasks[nw]=[];
    var already=S.carriedTasks[nw].some(function(t){return t.id===task.id;});
    if(!already&&!(rule==="co"&&count>=2)){
      S.carriedTasks[nw].push(Object.assign({},task,{carriedFrom:"Week "+S.week,skipCount:count}));
    }
    if(rule==="co"&&count>=2){
      S.parkingLot.push({id:uid(),name:task.name,from:"Carried twice — auto-moved from Week "+S.week,type:"someday"});
    }
  }
  save();render();
}

function getUnlocked(){
  var lvl=getLvl().lvl;var u=[];
  if(lvl>=1)u.push(0);if(lvl>=3)u.push(1);if(lvl>=5)u.push(2);
  if(lvl>=6)u.push(3);if(lvl>=7)u.push(4);if(lvl>=9)u.push(5);
  return u;
}

function render(){
  var app=document.getElementById("app");
  var nav=document.getElementById("bottom-nav");
  app.innerHTML="";
  nav.innerHTML="";

  // LEVEL UP SCREEN
  // Check walkthrough
  if(!S.onboardingDone){renderWalkthrough(app);buildNav(nav);return;}

  if(S.showLU&&S.luData){
    app.innerHTML='<div style="padding:16px"><div class="lu-wrap"><div class="lu-lvl">Level '+S.luData.lvl+' \u2014 '+S.luData.name+'</div><div class="lu-sub">The city responds to your commitment.</div><div class="lu-unlock">'+S.luData.unlock+'</div><button class="lu-btn" id="lu-b">Continue building &#8594;</button></div></div>';
    document.getElementById("lu-b").onclick=function(){S.showLU=false;save();render();};
    buildNav(nav);
    return;
  }

  if(S.editModal){renderModal(app,"edit");buildNav(nav);return;}
  if(S.addModal){renderModal(app,"add");buildNav(nav);return;}

  // HEADER
  var lvl=getLvl(),nxt=getNxt();
  var pct=nxt?Math.round(((S.xp-lvl.xp)/(nxt.xp-lvl.xp))*100):100;
  var hdr=document.createElement("div");hdr.className="hdr";
  hdr.innerHTML='<div class="hdr-top"><span class="hdr-title">The Architect</span><div class="xp-row"><span class="xp-val">'+S.xp+'</span><span class="xp-lbl">XP</span><span class="lvl-badge">LVL '+lvl.lvl+'</span></div></div><div class="xp-bar"><div class="xp-fill" style="width:'+pct+'%"></div></div><div class="xp-sub"><span>'+S.xp+' / '+(nxt?nxt.xp:'max')+' XP</span><span>'+lvl.name+'</span></div>';
  app.appendChild(hdr);
  injectHelpButton(hdr);

  if(S.view==="today") renderToday(app);
  else if(S.view==="city"){renderCity(app);renderFVBanner(app,"city");}
  else if(S.view==="boss"){renderBoss(app);renderFVBanner(app,"boss");}
  else if(S.view==="review"){renderReview(app);renderFVBanner(app,"review");}
  else if(S.view==="vision"){renderVision(app);renderFVBanner(app,"vision");}
  else if(S.view==="parking"){renderParking(app);renderFVBanner(app,"parking");}
  else if(S.view==="settings") renderSettings(app);

  if(S.helpOpen) renderHelpSheet(app);
  buildNav(nav);

  if(S.openMenu){
    document.addEventListener("click",function h(e){
      if(!e.target.closest(".task-menu")&&!e.target.closest(".tdots")){
        S.openMenu=null;render();document.removeEventListener("click",h);
      }
    },{once:true,capture:true});
  }
}

function buildNav(nav){
  var items=[
    {icon:"&#9728;",label:"Today",v:"today"},
    {icon:"&#9672;",label:"City",v:"city"},
    {icon:"&#8599;",label:"Boss",v:"boss"},
    {icon:"&#9678;",label:"Review",v:"review"},
    {icon:"&#10022;",label:"Vision",v:"vision"},
    {icon:"P",label:"Lot",v:"parking"},
    {icon:"&#9881;",label:"Settings",v:"settings"}
  ];
  items.forEach(function(item){
    var active=S.view===item.v;
    var b=document.createElement("button");b.className="bn-btn";
    b.innerHTML='<div class="bn-icon">'+item.icon+'</div><div class="bn-label'+(active?" a":"")+'">'+item.label+'</div><div class="bn-dot'+(active?" a":"")+'"></div>';
    b.onclick=function(){S.view=item.v;S.openMenu=null;document.getElementById("scroll-area").scrollTop=0;render();};

function getDistrictStage(districtIdx){
  // Returns 0-3: 0=ruins,1=foundation,2=rising,3=complete
  var unlocked=getUnlocked();
  if(unlocked.indexOf(districtIdx)===-1) return 0;
  var distCats=["Work","Business","Creative","Community","",""];
  var cat=distCats[districtIdx];
  if(!cat) return 1; // unlocked but no tasks yet = foundation
  var allDone=0,allTotal=0;
  ["1","2","3","4"].forEach(function(w){
    var wt=TASKS[w]||[];
    var rel=wt.filter(function(t){return t.cat===cat;});
    allTotal+=rel.length;
    allDone+=rel.filter(function(t){return S.checked[t.id]==="done";}).length;
  });
  if(allTotal===0) return 1;
  var pct=allDone/allTotal;
  if(pct>=0.75) return 3;
  if(pct>=0.4) return 2;
  return 1;
}

function buildDistrictSVG(idx,x,color,darkColor,accentColor,stage,label){
  if(stage===0) return '<g opacity="0.12"><rect x="'+(x)+'" y="120" width="10" height="40" fill="#242433" rx="1"/><rect x="'+(x+14)+'" y="128" width="8" height="32" fill="#1E1E2C" rx="1"/></g>';
  var baseH=stage>=2?80:60;var towerH=stage>=2?72:52;var accentH=stage>=3?90:baseH;
  var baseY=160-baseH;var towerY=160-towerH;var accentY=160-accentH;
  var windows=stage>=2?'<rect x="'+(x+4)+'" y="'+(baseY+10)+'" width="5" height="3" fill="'+accentColor+'"/><rect x="'+(x+13)+'" y="'+(baseY+10)+'" width="5" height="3" fill="'+accentColor+'"/>':'';
  var crown=stage>=3?'<rect x="'+(x-2)+'" y="'+(accentY-6)+'" width="28" height="4" fill="'+accentColor+'"/>':'';
  var glow=stage>=3?'<circle cx="'+(x+12)+'" cy="'+(accentY-10)+'" r="3" fill="'+accentColor+'" opacity="0.6"/>':'';
  return '<g>'
    +'<rect x="'+x+'" y="'+baseY+'" width="24" height="'+baseH+'" fill="'+color+'" rx="2"/>'
    +'<rect x="'+(x+6)+'" y="'+towerY+'" width="12" height="'+towerH+'" fill="'+darkColor+'" rx="2"/>'

    +'</g>';
}

function makeCard(task){
  var status=S.checked[task.id]||"";
  var isDone=status==="done",isSkip=status==="skip";
  var bs=CS[task.cat]||CS.Custom;
  var xpAmt=task.xp||(XM[task.cat]||10);
  var rule=task.skipRule||SR[task.cat]||"nc";
  var isMenuOpen=S.openMenu===task.id;

  var card=document.createElement("div");
  card.className="task-item"+(isDone?" comp":"")+(isSkip?" skip-state":"")+(task.carried?" carried":"")+(task._wontReach&&!isDone&&!isSkip?" task-wont-reach":"");

  var chk=document.createElement("div");chk.className="chk"+(isDone?" done":"")+(isSkip?" sk":"");
  chk.textContent=isDone?"\u2713":(isSkip?"\u00d7":"");
  chk.onclick=function(){
    if(S.checked[task.id]==="done"){
      S.xp=Math.max(0,S.xp-xpAmt);S.checked[task.id]="";save();render();
    } else {
      var prev=getLvl().lvl;S.checked[task.id]="done";S.xp+=xpAmt;
      var now=getLvl();if(now.lvl>prev){S.showLU=true;S.luData=now;}
      save();render();
    }
  };

  var body=document.createElement("div");body.className="task-body";
  var nm=document.createElement("div");nm.className="task-name";nm.textContent=task.name;
  var chips=document.createElement("div");chips.className="chips";

  var cc=document.createElement("span");cc.className="chip";cc.style.cssText="background:"+bs.bg+";color:"+bs.t;cc.textContent=task.cat;
  var sc=document.createElement("span");sc.className="c-seed";sc.textContent=task.seed;
  var tc=document.createElement("span");tc.className="c-time";tc.textContent=task.time;
  var xc=document.createElement("span");xc.className="c-xp";xc.textContent="+"+xpAmt+" XP";

  var blockName="";
  DAY_BLOCKS.forEach(function(b){if(b.taskCats.indexOf(task.cat)>-1) blockName=b.name;});
  if(!blockName) blockName=task.depth==="deep"?"Deep work":"Shallow work";
  var bc=document.createElement("span");bc.className="c-block";
  bc.style.cssText="background:"+(task.depth==="deep"?"rgba(127,119,221,0.12)":"rgba(29,158,117,0.12)")+";color:"+(task.depth==="deep"?"#AFA9EC":"#5DCAA5");
  bc.textContent=blockName;

  chips.appendChild(cc);chips.appendChild(sc);chips.appendChild(tc);chips.appendChild(xc);chips.appendChild(bc);
  if(task.quick){var qc=document.createElement("span");qc.className="c-quick";qc.textContent="quick win";chips.appendChild(qc);}
  if(task.carried){var crc=document.createElement("span");crc.className="c-carry";crc.textContent="carried";chips.appendChild(crc);}
  if(task._recommended&&!task.carried){var rcc=document.createElement("span");rcc.className="chip-recommended";rcc.textContent="today";chips.appendChild(rcc);}
  if(task._wontReach){var wrc=document.createElement("span");wrc.className="chip-wont-reach";wrc.textContent="won't reach";chips.appendChild(wrc);}

  body.appendChild(nm);body.appendChild(chips);
  if(task.action){var act=document.createElement("div");act.className="task-action";act.textContent=task.action;body.appendChild(act);}

  var si=document.createElement("div");si.className="skip-info";
  if(rule==="nc") si.textContent="Skip: no carry-forward. Never miss twice.";
  else if(rule==="c") si.textContent="Skip: carries to next week automatically.";
  else si.textContent="Skip: carries once. Twice \u2192 Parking Lot.";
  body.appendChild(si);

  var sb=document.createElement("button");sb.className="skip-btn";sb.textContent=isSkip?"undo skip":"skip today";
  sb.onclick=function(e){e.stopPropagation();if(isSkip){S.checked[task.id]="";save();render();}else{handleSkip(task);}};
  body.appendChild(sb);

  var dots=document.createElement("div");dots.className="tdots";dots.textContent="\u2022\u2022\u2022";
  dots.onclick=function(e){e.stopPropagation();S.openMenu=isMenuOpen?null:task.id;render();};

  card.appendChild(chk);card.appendChild(body);card.appendChild(dots);

  if(isMenuOpen){
    var menu=document.createElement("div");menu.className="task-menu";
    var menuItems=[
      {icon:"\u270E",label:"Edit task",cls:"",fn:function(){
        S.openMenu=null;
        S.editModal={id:task.id,name:task.name,action:task.action||"",time:task.time||"",cat:task.cat,seed:task.seed,xp:xpAmt,depth:task.depth||"shallow",isCustom:!!task.custom};
        render();
      }},
      {icon:"\u2295",label:"Duplicate",cls:"",fn:function(){
        S.openMenu=null;var k="w"+S.week;if(!S.customTasks[k])S.customTasks[k]=[];
        S.customTasks[k].push(Object.assign({},task,{id:uid(),name:task.name+" (copy)",custom:true}));
        save();render();
      }},
      {icon:"\u2192",label:"To Parking Lot",cls:"",fn:function(){
        S.openMenu=null;S.parkingLot.push({id:uid(),name:task.name,from:"Moved from Week "+S.week,type:"idea"});
        S.deletedIds[task.id]=true;save();render();
      }},
      {icon:"\u00d7",label:"Delete task",cls:"danger",fn:function(){
        S.openMenu=null;S.deletedIds[task.id]=true;
        if(S.checked[task.id]==="done")S.xp=Math.max(0,S.xp-xpAmt);
        delete S.checked[task.id];save();render();
      }}
    ];
    menuItems.forEach(function(item){
      var mi=document.createElement("div");mi.className="mi"+(item.cls?" "+item.cls:"");
      mi.innerHTML='<span class="mi-icon">'+item.icon+'</span>'+item.label;
      mi.onclick=item.fn;menu.appendChild(mi);
    });
    card.appendChild(menu);
  }
  return card;
}

function renderModal(app, type){
  var m=type==="edit"?S.editModal:S.addModal;
  var overlay=document.createElement("div");overlay.className="modal-overlay";
  var modal=document.createElement("div");modal.className="modal";
  modal.innerHTML='<div class="modal-title">'+(type==="edit"?"Edit task":"Add task")+'</div>';

  var fields=type==="edit"
    ? [
        {label:"Task name",type:"textarea",key:"name",rows:2},
        {label:"Action description",type:"textarea",key:"action",rows:3},
        {label:"Time commitment",type:"input",key:"time"},
        {label:"Category",type:"select",key:"cat",opts:CATS},
        {label:"Seed or system",type:"input",key:"seed"},
        {label:"Work depth",type:"select",key:"depth",opts:["deep","shallow"]},
        {label:"XP value",type:"number",key:"xp"}
      ]
    : [
        {label:"Task name",type:"textarea",key:"name",rows:2},
        {label:"Action description (optional)",type:"textarea",key:"action",rows:2,ph:"What exactly do you do?"},
        {label:"Time commitment",type:"input",key:"time",ph:"e.g. 25 min"},
        {label:"Category",type:"select",key:"cat",opts:CATS},
        {label:"Building toward",type:"input",key:"seed",ph:"e.g. Seed 6, System, Life"},
        {label:"Work depth",type:"select",key:"depth",opts:["shallow","deep"]}
      ];

  var inputs={};
  fields.forEach(function(f){
    var lbl=document.createElement("div");lbl.className="m-lbl";lbl.textContent=f.label;modal.appendChild(lbl);
    var inp;
    if(f.type==="textarea"){
      inp=document.createElement("textarea");inp.rows=f.rows||2;
      if(f.ph) inp.placeholder=f.ph;
    } else if(f.type==="select"){
      inp=document.createElement("select");
      (f.opts||[]).forEach(function(o){
        var opt=document.createElement("option");opt.value=o;opt.textContent=o;
        if(m&&m[f.key]===o) opt.selected=true;
        else if(!m&&o==="Custom") opt.selected=true;
        inp.appendChild(opt);
      });
    } else {
      inp=document.createElement("input");inp.type=f.type||"text";
      if(f.ph) inp.placeholder=f.ph;
    }
    inp.className=f.type==="select"?"m-sel":"m-inp";
    if(f.type!=="select"&&m) inp.value=m[f.key]||"";
    inputs[f.key]=inp;modal.appendChild(inp);
  });

  var btnRow=document.createElement("div");btnRow.className="m-row";
  var cancel=document.createElement("button");cancel.className="m-btn cancel";cancel.textContent="Cancel";
  cancel.onclick=function(){if(type==="edit")S.editModal=null;else S.addModal=null;render();};

  var saveB=document.createElement("button");saveB.className="m-btn save";
  saveB.textContent=type==="edit"?"Save changes":"Add task";
  saveB.onclick=function(){
    if(type==="edit"){
      var updates={
        name:inputs.name.value.trim()||m.name,
        action:inputs.action.value.trim(),
        time:inputs.time.value.trim()||m.time,
        cat:inputs.cat.value,
        seed:inputs.seed.value.trim()||m.seed,
        depth:inputs.depth.value,
        xp:Math.max(5,parseInt(inputs.xp.value)||m.xp)
      };
      if(m.isCustom){
        Object.keys(S.customTasks).forEach(function(k){
          S.customTasks[k]=S.customTasks[k].map(function(t){return t.id===m.id?Object.assign({},t,updates):t;});
        });
      } else if(m.isRecurring){
        // Edit recurring task: save to baseId so all weeks inherit
        S.overrides[m.baseId]=updates;
      } else {
        S.overrides[m.id]=updates;
      }
      S.editModal=null;
    } else {
      var v=inputs.name.value.trim();
      if(!v){S.addModal=null;render();return;}
      var k="w"+S.week;if(!S.customTasks[k])S.customTasks[k]=[];
      S.customTasks[k].push({
        id:uid(),
        cat:inputs.cat.value||"Custom",
        seed:inputs.seed?inputs.seed.value.trim()||"Custom":"Custom",
        name:v,

function initTimeState(){
  if(!S.hasOwnProperty("eodDefault")) S.eodDefault="21:00";
  if(!S.hasOwnProperty("eodToday")) S.eodToday=null;
  if(!S.hasOwnProperty("eodConfirmedDate")) S.eodConfirmedDate=null;
  if(!S.hasOwnProperty("timeViewOpen")) S.timeViewOpen=false;
  if(!S.hasOwnProperty("lastRealloc")) S.lastRealloc=null;
}

function getEOD(){
  var today=new Date().toDateString();
  if(S.eodConfirmedDate===today&&S.eodToday) return S.eodToday;
  return S.eodDefault;
}

function parseTime(str){
  // "21:00" or "9:00pm" → minutes since midnight
  str=(str||"").trim().toLowerCase();
  var ampm=str.includes("pm")||str.includes("am");
  str=str.replace(/[apm]/g,"").trim();
  var parts=str.split(":");
  var h=parseInt(parts[0])||0;
  var m=parseInt(parts[1])||0;
  if(ampm&&str.includes("pm")&&h<12) h+=12;
  if(ampm&&str.includes("am")&&h===12) h=0;
  return h*60+m;
}

function formatMinutes(mins){
  if(mins<=0) return "0 min";
  if(mins<60) return Math.round(mins)+" min";
  var h=Math.floor(mins/60);var m=Math.round(mins%60);
  return m>0?h+"h "+m+"m":h+"h";
}

function getNow(){
  var now=new Date();
  return now.getHours()*60+now.getMinutes();
}

function getMinutesLeft(){
  var eodMins=parseTime(getEOD());
  var nowMins=getNow();
  return Math.max(0,eodMins-nowMins);
}

function getTaskMinRange(task){
  var t=task.time||"15 min";
  var cleaned=t.replace(" min","");
  var parts=cleaned.split("-");
  var lo=parseInt(parts[0])||15;
  var hi=parts[1]?parseInt(parts[1]):lo;
  return {lo:lo,hi:hi,mid:Math.round((lo+hi)/2)};
}

function getDayPhase(){
  var h=new Date().getHours();
  if(h<10) return "morning";
  if(h<14) return "midday";
  if(h<18) return "afternoon";
  return "evening";
}

function getTaskPriority(task,minsLeft,phase){
  var status=S.checked[task.id]||"";
  if(status==="done"||status==="skip") return -1; // already handled
  var range=getTaskMinRange(task);
  if(range.lo>minsLeft) return -2; // won't fit
  var score=0;
  if(task.mvd) score+=100;
  if(task.carried) score+=50;
  if(task.depth==="deep"&&(phase==="morning"||phase==="midday")) score+=40;
  if(task.depth==="shallow"&&(phase==="afternoon"||phase==="evening")) score+=30;
  if(task.quick) score+=20;
  if(task.cat==="Routine") score+=15;
  if(task.cat==="Life") score-=5;
  score-=range.mid; // shorter tasks score slightly higher when time is tight
  return score;
}

function getRecommendedStack(tasks,minsLeft){
  var phase=getDayPhase();
  var pending=tasks.filter(function(t){
    var s=S.checked[t.id]||"";return s!==" done"&&s!=="done"&&s!=="skip";
  });
  var scored=pending.map(function(t){
    return {task:t,score:getTaskPriority(t,minsLeft,phase),range:getTaskMinRange(t)};
  });
  scored.sort(function(a,b){return b.score-a.score;});

  var fits=[],wontReach=[];
  var budget=minsLeft;
  scored.forEach(function(s){
    if(s.score===-1) return; // done/skip
    if(s.score===-2||s.range.lo>budget){
      wontReach.push(s.task);
    } else {
      fits.push(s.task);
      budget-=s.range.mid;
    }
  });
  return {fits:fits,wontReach:wontReach,phase:phase};
}

function getReallocationDest(task){
  var rule=task.skipRule||SR[task.cat]||"nc";
  if(rule==="nc") return "released — no carry";
  if(rule==="co"){
    var count=S.skipCounts[task.id]||0;
    return count>=1?"→ Parking Lot":"→ next week";
  }
  return "→ next week";
}

function runEndOfDayRealloc(tasks){
  var today=new Date().toDateString();
  if(S.lastRealloc===today) return; // already ran today
  var minsLeft=getMinutesLeft();
  if(minsLeft>5) return; // not end of day yet
  
  var pending=tasks.filter(function(t){
    var s=S.checked[t.id]||"";return s!=="done"&&s!=="skip";
  });
  pending.forEach(function(task){
    handleSkip(task); // reuse existing skip logic
  });
  S.lastRealloc=today;
  save();
}

function renderTimeView(app,tasks){

// ── SMART TASK REORDERING ──
function applyTimeOrdering(tasks){
  var minsLeft=getMinutesLeft();
  var rec=getRecommendedStack(tasks,minsLeft);
  var fitIds=rec.fits.map(function(t){return t.id;});
  var wontIds=rec.wontReach.map(function(t){return t.id;});

  // Tag tasks
  tasks.forEach(function(t){
    t._recommended=fitIds.indexOf(t.id)>-1;
    t._wontReach=wontIds.indexOf(t.id)>-1;
    t._fitRank=fitIds.indexOf(t.id);
  });

  // Sort: recommended first (by fitRank), then won't-reach at bottom
  tasks.sort(function(a,b){
    var aS=S.checked[a.id]||"";var bS=S.checked[b.id]||"";
    var aDone=aS==="done"||aS==="skip";var bDone=bS==="done"||bS==="skip";
    if(aDone&&!bDone) return 1;if(!aDone&&bDone) return -1;
    if(a._recommended&&!b._recommended) return -1;
    if(!a._recommended&&b._recommended) return 1;
    if(a._recommended&&b._recommended) return a._fitRank-b._fitRank;
    return 0;
  });
  return tasks;
}

function getRecurringId(baseId,week){return baseId+"_w"+week;}

function getRecurringTasks(week){
  return RECURRING_TEMPLATES.map(function(t){
    var id=getRecurringId(t.baseId,week);
    var override=S.overrides[t.baseId]||{};
    return Object.assign({},t,override,{id:id,recurring:true,baseId:t.baseId});
  });
}

function getWeekTasks(week){
  var base=(TASKS[week]||[])
    .filter(function(t){return!S.deletedIds[t.id];})
    .map(function(t){return S.overrides[t.id]?Object.assign({},t,S.overrides[t.id]):t;});
  // Remove any hardcoded recurring tasks (they are now generated)
  var recurringCats=["Routine","Mind","Soul","Body"];
  var recurringNames=["Morning Anchor","Morning Pages","Faith moment","Movement","Evening Close"];
  var filtered=base.filter(function(t){
    if(!recurringCats.includes(t.cat)) return true;
    var isHardcodedRecurring=recurringNames.some(function(n){return t.name.startsWith(n);});
    return !isHardcodedRecurring;
  });
  var recurring=getRecurringTasks(week);
  var carried=(S.carriedTasks[week]||[]).filter(function(t){return!S.deletedIds[t.id];});
  var custom=(S.customTasks["w"+week]||[]).filter(function(t){return!S.deletedIds[t.id];});
  return recurring.concat(filtered)
    .concat(carried.map(function(t){return Object.assign({},t,{carried:true});}))
    .concat(custom);
}

  if(step<WALKTHROUGH.length-1){
    var skip=document.createElement("span");skip.className="wt-skip";skip.textContent="Skip walkthrough";
    skip.onclick=function(){S.onboardingDone=true;S.wtStep=0;save();render();};
    footer.appendChild(skip);
  }
  div.appendChild(footer);
  app.appendChild(div);
}

// ── HELP BUTTON (injected into header) ──
function injectHelpButton(hdrEl){
  var btn=document.createElement("button");btn.className="help-btn";btn.textContent="?";
  btn.title="Help";
  btn.onclick=function(e){
    e.stopPropagation();
    S.helpOpen=true;
    S.helpTab=S.view||"today";
    save();render();
  };
  // Insert at the start of hdr-top
  var hdrTop=hdrEl.querySelector(".hdr-top");
  if(hdrTop) hdrTop.insertBefore(btn,hdrTop.firstChild);
}

// ── HELP SHEET RENDERER ──
function renderHelpSheet(app){
  var overlay=document.createElement("div");overlay.className="help-overlay";
  overlay.onclick=function(e){if(e.target===overlay){S.helpOpen=false;save();render();}};

  var sheet=document.createElement("div");sheet.className="help-sheet";

  // Header
  var hdr=document.createElement("div");hdr.className="help-sheet-hdr";
  var titleEl=document.createElement("div");titleEl.className="help-sheet-title";
  titleEl.textContent=(TAB_EXPLAINERS[S.helpTab]||{title:"Help"}).title;
  var closeBtn=document.createElement("div");closeBtn.className="help-close";closeBtn.textContent="×";
  closeBtn.onclick=function(){S.helpOpen=false;save();render();};
  hdr.appendChild(titleEl);hdr.appendChild(closeBtn);
  sheet.appendChild(hdr);

  // Tab row
  var tabRow=document.createElement("div");tabRow.className="help-tabs";
  Object.keys(TAB_EXPLAINERS).forEach(function(key){
    var tab=document.createElement("div");tab.className="help-tab"+(S.helpTab===key?" a":"");
    tab.textContent=key.charAt(0).toUpperCase()+key.slice(1);
    (function(k){tab.onclick=function(){
      S.helpTab=k;
      titleEl.textContent=(TAB_EXPLAINERS[k]||{title:"Help"}).title;
      renderHelpBody(bodyEl,k);
      tabRow.querySelectorAll(".help-tab").forEach(function(t){t.classList.remove("a");});
      tab.classList.add("a");
    };})(key);
    tabRow.appendChild(tab);
  });
  sheet.appendChild(tabRow);

  // Body
  var bodyEl=document.createElement("div");bodyEl.className="help-body";
  renderHelpBody(bodyEl,S.helpTab);
  sheet.appendChild(bodyEl);

  overlay.appendChild(sheet);
  app.appendChild(overlay);
}

function renderHelpBody(bodyEl,key){
  bodyEl.innerHTML="";
  var data=TAB_EXPLAINERS[key];if(!data)return;
  data.sections.forEach(function(sec){
    var s=document.createElement("div");s.className="help-section";
    var h=document.createElement("div");h.className="help-section-hdr";h.textContent=sec.h;
    var b=document.createElement("div");b.className="help-section-body";b.textContent=sec.b;
    s.appendChild(h);s.appendChild(b);bodyEl.appendChild(s);
  });
  // Replay walkthrough button
  var replay=document.createElement("button");replay.className="help-replay";
  replay.textContent="↺  Replay the walkthrough";
  replay.onclick=function(){S.helpOpen=false;S.onboardingDone=false;S.wtStep=0;save();render();};
  bodyEl.appendChild(replay);
}

// ── FIRST VISIT BANNER ──
function renderFVBanner(app,tab){
  if(S.fvSeen[tab]||!FV_NOTES[tab])return;
  var div=document.createElement("div");div.className="fv-banner";
  var txt=document.createElement("div");txt.className="fv-text";txt.textContent=FV_NOTES[tab];
  var dismiss=document.createElement("div");dismiss.className="fv-dismiss";dismiss.textContent="×";
  dismiss.onclick=function(){S.fvSeen[tab]=true;save();div.remove();};
  div.appendChild(txt);div.appendChild(dismiss);
  app.appendChild(div);
}

// INIT
load();
initOnboardingState();
var t2=new Date().toDateString();
var y2=new Date();y2.setDate(y2.getDate()-1);
if(S.lastDate===y2.toDateString()){S.streak++;}
else if(S.lastDate!==t2&&S.lastDate){S.streak=1;}
else if(!S.lastDate){S.streak=1;}
S.lastDate=t2;
save();
render();
</script>
